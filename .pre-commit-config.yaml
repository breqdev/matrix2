repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.66.0
    hooks:
      - id: oxlint
  - repo: https://github.com/oxc-project/mirrors-oxfmt
    rev: v0.51.0
    hooks:
      - id: oxfmt
