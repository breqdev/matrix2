repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.66.0
    hooks:
      - id: oxlint
  - repo: https://github.com/oxc-project/mirrors-oxfmt
    rev: v0.51.0
    hooks:
      - id: oxfmt
  - repo: local
    hooks:
      - id: regenerate-matrix-schema
        name: Regenerate matrix schema
        entry: env -u VIRTUAL_ENV uv run scripts/generate_config_schema.py
        language: python
        additional_dependencies: ["uv"]
        files: matrix/utils/config.py
        pass_filenames: false
